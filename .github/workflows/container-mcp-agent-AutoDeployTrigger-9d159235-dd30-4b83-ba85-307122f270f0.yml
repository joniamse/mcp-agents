name: Trigger auto deployment for container-mcp-agent

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/container-mcp-agent-AutoDeployTrigger-9d159235-dd30-4b83-ba85-307122f270f0.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTAINERMCPAGENT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTAINERMCPAGENT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTAINERMCPAGENT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ca0fac172ae1acr.azurecr.io
          registryUsername: ${{ secrets.CONTAINERMCPAGENT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTAINERMCPAGENT_REGISTRY_PASSWORD }}
          containerAppName: container-mcp-agent
          resourceGroup: RG_MCP_Agent
          imageToBuild: ca0fac172ae1acr.azurecr.io/container-mcp-agent:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


